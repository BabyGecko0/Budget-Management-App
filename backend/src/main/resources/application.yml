spring:
  datasource:
    url: jdbc:h2:file:${BUDGET_APP_DATA_DIR:./data}/budgetdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

server:
  port: ${SERVER_PORT:8085}

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_IN_PROD_MUST_BE_32_CHARS}
  expiration-ms: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.budgetapp: DEBUG
  file:
    name: ${BUDGET_APP_DATA_DIR:./data}/logs/app.log
